<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Renderoid Engine Demo</title>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      margin: 20px 0;
    }

    canvas {
      background: white;
      border: 1px solid #ccc;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <h1>Renderoid UI Engine</h1>
  <canvas id="app" width="480" height="720"></canvas>

  <script type="module">
    import { Engine } from '../src/index.js'

    const canvas = document.getElementById('app')
    const engine = new Engine(canvas)

    const xml = `
      <LinearLayout
        orientation="vertical"
        padding="0"
        background="#eeeeee">

        <LinearLayout
          width="match_parent"
          height="10"
          orientation="horizontal"
          background="#000">
        </LinearLayout>
        
        <TextView
          text="Header"
          fontSize="24"
          textColor="#587856"
          background="#ffdddd"
          margin="0"/>
        
        <TextView
          text="Body"
          weight="1"
          background="#ddffdd"
          margin="10"/>
        
      </LinearLayout>
    `

    engine.renderXML(xml)
  </script>

</body>
</html>
