<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Renderoid Engine Demo</title>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      margin: 20px 0;
    }

    canvas {
      background: white;
      border: 1px solid #ccc;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <h1>Renderoid UI Engine</h1>
  <canvas id="app" width="500" height="400"></canvas>

  <script type="module">
    import { Engine } from '../src/index.js'

    const canvas = document.getElementById('app')
    const engine = new Engine(canvas)

    const xml = `
      <LinearLayout orientation="vertical">
        <TextView
          text="Hello Renderoid!"
          textColor="#ff0000"
          fontSize="28" />

        <TextView
          text="Second Line"
          textColor="#0000ff"
          fontSize="20" />

        <LinearLayout orientation="horizontal">
          <TextView
            text="Left"
            textColor="green"
            fontSize="18" />

          <TextView
            text="Right"
            textColor="purple"
            fontSize="18" />
        </LinearLayout>

      </LinearLayout>
    `

    engine.renderXML(xml)
  </script>

</body>
</html>
